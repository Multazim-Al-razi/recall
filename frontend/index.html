<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/png" href="/favicon.png" />
        <link rel="apple-touch-icon" href="/favicon.png" />
        <link rel="manifest" href="/manifest.webmanifest" />
        <meta name="theme-color" content="#d4443a" />
        <meta name="color-scheme" content="light dark" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-title" content="Recall" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600;9..144,700&display=swap"
            rel="stylesheet"
        />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, viewport-fit=cover"
        />
        <!-- F-5: baseline Content-Security-Policy. Locks the app to its own
             origin, allows Google Fonts + the brand-icon CDN as image sources,
             and forbids framing / framing of others. The Vite dev server and
             local CLI companion are allowed under connect-src, along with Supabase. -->
        <meta
            http-equiv="Content-Security-Policy"
            content="default-src 'self';
                     script-src 'self';
                     style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
                     font-src 'self' https://fonts.gstatic.com;
                     img-src 'self' data: blob: https://cdn.simpleicons.org;
                     connect-src 'self' https://api.github.com https://*.supabase.co wss://*.supabase.co http://localhost:21121 http://localhost:3001 ws://localhost:5173;
                     frame-ancestors 'none';
                     base-uri 'self';
                     form-action 'self';"
        />
        <title>Recall</title>
        <meta
            name="description"
            content="Track every recurring charge, see your true monthly burn, and never get billed by surprise. Local-first, private, and free during early access."
        />
        <meta property="og:type" content="website" />
        <meta property="og:title" content="Recall" />
        <meta
            property="og:description"
            content="Track every recurring charge, see your true monthly burn, and never get billed by surprise. Local-first, private, and free during early access."
        />
        <meta name="twitter:card" content="summary_large_image" />
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
